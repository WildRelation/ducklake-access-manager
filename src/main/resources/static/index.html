<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DuckLake Access Manager</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1e2530;
    --border: #2a3140; --border2: #3a4455;
    --fg: #e6edf3; --fg2: #8b949e; --fg3: #4d5562;
    --accent: #2dd4bf; --accent-dim: rgba(45,212,191,.12); --accent-glow: rgba(45,212,191,.25);
    --red: #f87171; --red-dim: rgba(248,113,113,.12);
    --yellow: #fbbf24; --yellow-dim: rgba(251,191,36,.10);
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  html, body { height: 100%; }
  body { font-family: var(--sans); background: var(--bg); color: var(--fg); font-size: 14px; line-height: 1.6; }
  #root { min-height: 100vh; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px; animation: fadeIn .15s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media (max-width: 640px) {
    .app-header { padding: 0 16px !important; } .app-main { padding: 24px 16px !important; }
    .overlay { padding: 0 !important; align-items: flex-end !important; }
    .modal-inner { border-radius: 14px 14px 0 0 !important; max-height: 92vh !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ── Auth ── */
const KEYCLOAK_BASE = 'https://iam.cloud.cbh.kth.se/realms/cloud/protocol/openid-connect';
const CLIENT_ID     = 'ducklake';
const REDIRECT_URI  = window.location.origin + '/';

function genVerifier() { const a = new Uint8Array(32); crypto.getRandomValues(a); return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
async function genChallenge(v) { const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v)); return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch { return null; } }
async function login() {
  const v = genVerifier(), c = await genChallenge(v);
  sessionStorage.setItem('pkce_verifier', v);
  window.location.href = `${KEYCLOAK_BASE}/auth?` + new URLSearchParams({ client_id: CLIENT_ID, redirect_uri: REDIRECT_URI, response_type: 'code', scope: 'openid profile email', code_challenge: c, code_challenge_method: 'S256' });
}
async function exchangeCode(code) {
  const v = sessionStorage.getItem('pkce_verifier'); sessionStorage.removeItem('pkce_verifier');
  const res = await fetch(`${KEYCLOAK_BASE}/token`, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams({ grant_type:'authorization_code', client_id:CLIENT_ID, redirect_uri:REDIRECT_URI, code, code_verifier:v }) });
  if (!res.ok) throw new Error('Token exchange failed');
  return res.json();
}
function logout(idToken) {
  sessionStorage.removeItem('access_token'); sessionStorage.removeItem('id_token');
  window.location.href = `${KEYCLOAK_BASE}/logout?` + new URLSearchParams({ client_id:CLIENT_ID, post_logout_redirect_uri:REDIRECT_URI, id_token_hint:idToken });
}
function isAdmin(claims) {
  const roles = claims?.resource_access?.ducklake?.roles;
  return Array.isArray(roles) && roles.includes('admin');
}

/* ── Styles ── */
const btnPrimary   = { display:'flex', alignItems:'center', gap:7, background:'var(--accent)', color:'#0d1117', border:'none', borderRadius:7, padding:'9px 18px', fontFamily:'var(--sans)', fontSize:13, fontWeight:600, cursor:'pointer' };
const btnSecondary = { display:'flex', alignItems:'center', gap:7, background:'transparent', color:'var(--fg2)', border:'1px solid var(--border)', borderRadius:7, padding:'9px 18px', fontFamily:'var(--sans)', fontSize:13, fontWeight:500, cursor:'pointer' };
const inputStyle   = { width:'100%', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:7, padding:'9px 13px', color:'var(--fg)', fontFamily:'var(--sans)', fontSize:13, outline:'none' };
const focusAccent  = e => e.target.style.borderColor = 'var(--accent)';
const blurBorder   = e => e.target.style.borderColor = 'var(--border)';

/* ── Icons ── */
const Icon = ({ name, size=16 }) => ({
  duck:    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><ellipse cx="8" cy="9" rx="5" ry="4" fill="currentColor" opacity=".9"/><circle cx="8" cy="5" r="2.5" fill="currentColor"/><path d="M10 5.5l2 .5-.5 1.5" stroke="var(--bg)" strokeWidth="1" strokeLinecap="round"/><circle cx="9" cy="4.8" r=".6" fill="var(--bg)"/></svg>,
  key:     <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="5.5" cy="8" r="3" stroke="currentColor" strokeWidth="1.4"/><path d="M8 8h6M12 8v2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>,
  trash:   <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M2.5 4h11M5.5 4V2.5h5V4M6.5 7v5M9.5 7v5M3.5 4l.8 9.5h7.4l.8-9.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  close:   <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  logout:  <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  alert:   <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" strokeWidth="1.4"/><path d="M8 5v3.5M8 10.5v.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  warn:    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 1.5L14.5 13.5H1.5L8 1.5Z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/><path d="M8 6v3.5M8 11.5v.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  copy:    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.4"/><path d="M3 11V3a1 1 0 0 1 1-1h8" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>,
  check:   <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  plus:    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  bucket:  <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 4h10l-1.5 9H4.5L3 4Z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/><path d="M1.5 4h13" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/><path d="M6 4V2.5h4V4" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>,
  refresh: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.86 4.4 2.2L14 3v4h-4l1.7-1.7" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  users:   <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" strokeWidth="1.4"/><path d="M1 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/><circle cx="12" cy="5" r="2" stroke="currentColor" strokeWidth="1.3"/><path d="M14 13c0-1.66-.9-3.13-2.24-3.92" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>,
}[name] || null);

function Spinner({ size=18, color='var(--accent)' }) {
  return <svg width={size} height={size} viewBox="0 0 18 18" fill="none" style={{ animation:'spin .7s linear infinite', color }}><circle cx="9" cy="9" r="7" stroke="currentColor" strokeWidth="2" strokeDasharray="16 28" strokeLinecap="round"/></svg>;
}

function CopyBtn({ text, small }) {
  const [copied, setCopied] = useState(false);
  const copy = () => navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1800); });
  return (
    <button onClick={copy} style={{ display:'flex', alignItems:'center', gap:4, background: copied ? 'var(--accent-dim)' : 'transparent', border:`1px solid ${copied ? 'var(--accent)' : 'var(--border)'}`, borderRadius:6, color: copied ? 'var(--accent)' : 'var(--fg2)', padding: small ? '3px 7px' : '5px 9px', cursor:'pointer', fontFamily:'var(--sans)', fontSize:12, fontWeight:500, whiteSpace:'nowrap', flexShrink:0 }}>
      <Icon name={copied ? 'check' : 'copy'} size={13} />
      {!small && (copied ? 'Copied' : 'Copy')}
    </button>
  );
}

function CredRow({ label, value, secret }) {
  const [show, setShow] = useState(false);
  return (
    <div style={{ display:'grid', gridTemplateColumns:'140px 1fr auto', alignItems:'center', gap:12, padding:'10px 0', borderBottom:'1px solid var(--border)' }}>
      <span style={{ color:'var(--fg2)', fontSize:12, fontWeight:500 }}>{label}</span>
      <span style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--fg)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', cursor: secret ? 'pointer' : 'default', filter: secret && !show ? 'blur(4px)' : 'none', transition:'filter .2s', userSelect: secret && !show ? 'none' : 'text' }}
            onClick={() => secret && setShow(s => !s)} title={secret ? (show ? 'Click to hide' : 'Click to reveal') : undefined}>
        {value}
      </span>
      <CopyBtn text={value} small />
    </div>
  );
}

/* ── CredModal — same as before ── */
function CredModal({ creds, onClose }) {
  useEffect(() => { const h = e => { if (e.key === 'Escape') onClose(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [onClose]);
  const { s3Key, dbCredentials: db, duckdbScript } = creds;
  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-inner" style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, width:'100%', maxWidth:720, maxHeight:'92vh', overflow:'hidden', display:'flex', flexDirection:'column', animation:'slideUp .2s ease', boxShadow:'0 32px 64px rgba(0,0,0,.6)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:32, height:32, background:'var(--accent-dim)', border:'1px solid var(--accent-glow)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--accent)' }}><Icon name="key" size={15} /></div>
            <div><div style={{ fontWeight:600, fontSize:15 }}>Access Key Generated</div><div style={{ color:'var(--fg2)', fontSize:12 }}>{s3Key.bucketName}</div></div>
          </div>
          <button onClick={onClose} style={{ background:'transparent', border:'1px solid var(--border)', borderRadius:6, color:'var(--fg2)', cursor:'pointer', width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="close" size={14} /></button>
        </div>

        <div style={{ overflowY:'auto', flex:1 }}>
          <div style={{ margin:'16px 24px 0', padding:'10px 14px', background:'var(--yellow-dim)', border:'1px solid rgba(251,191,36,.25)', borderRadius:8, display:'flex', gap:10, color:'var(--yellow)', fontSize:13 }}>
            <Icon name="warn" size={15} /><span><strong>Save your Secret Key now.</strong> It will not be shown again after you close this dialog.</span>
          </div>

          <div style={{ padding:'20px 24px 0' }}>
            <div style={{ fontSize:11, fontWeight:600, color:'var(--fg3)', letterSpacing:'.08em', textTransform:'uppercase', marginBottom:4 }}>Raw Credentials</div>
            <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8, padding:'0 16px' }}>
              <CredRow label="S3 Key ID"     value={s3Key.keyId} />
              <CredRow label="S3 Secret Key" value={s3Key.secretKey} secret />
              <CredRow label="S3 Endpoint"   value={s3Key.endpoint} />
              <CredRow label="Bucket"        value={s3Key.bucketName} />
              <CredRow label="PG Host"       value={`${db.host}:${db.port}`} />
              <CredRow label="PG Database"   value={db.database} />
              <CredRow label="PG Username"   value={db.username} />
              <CredRow label="PG Password"   value={db.password} secret />
            </div>
          </div>

          <div style={{ padding:'20px 24px 24px' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
              <div style={{ fontSize:11, fontWeight:600, color:'var(--fg3)', letterSpacing:'.08em', textTransform:'uppercase' }}>DuckDB Connection Script</div>
              <CopyBtn text={duckdbScript} />
            </div>
            <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8, overflow:'hidden' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 14px', borderBottom:'1px solid var(--border)', background:'rgba(255,255,255,.02)' }}>
                <div style={{ display:'flex', gap:6 }}>{['#f87171','#fbbf24','#4ade80'].map(c => <div key={c} style={{ width:10, height:10, borderRadius:'50%', background:c, opacity:.6 }} />)}</div>
                <span style={{ fontSize:11, color:'var(--fg3)', fontFamily:'var(--mono)' }}>connection.sql</span>
                <div style={{ width:40 }} />
              </div>
              <pre style={{ fontFamily:'var(--mono)', fontSize:12, lineHeight:1.7, color:'var(--fg)', padding:'16px', overflow:'auto', margin:0, whiteSpace:'pre' }}>{duckdbScript}</pre>
            </div>
          </div>
        </div>

        <div style={{ padding:'16px 24px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'flex-end', flexShrink:0 }}>
          <button onClick={onClose} style={btnSecondary}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ── BucketsPage ── */
function BucketsPage({ token, admin }) {
  const [buckets, setBuckets]     = useState([]);
  const [loading, setLoading]     = useState(true);
  const [generating, setGenerating] = useState(null);
  const [modal, setModal]         = useState(null);
  const [permission, setPermission] = useState('read');

  const load = useCallback(async () => {
    const res = await fetch('/api/buckets', { headers: { Authorization: `Bearer ${token}` } });
    if (res.ok) setBuckets(await res.json());
  }, [token]);

  useEffect(() => { load().finally(() => setLoading(false)); }, [load]);

  const handleGenerate = async (bucket) => {
    setGenerating(bucket.id);
    try {
      const res = await fetch('/api/keys/generate', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ bucketName: bucket.name, permission: admin ? permission : 'read' }),
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `HTTP ${res.status}`); }
      setModal(await res.json());
    } catch (e) { alert('Error generating key: ' + e.message); }
    finally { setGenerating(null); }
  };

  if (loading) return <div style={{ display:'flex', justifyContent:'center', padding:60 }}><Spinner size={24} /></div>;

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:28 }}>
        <div>
          <h1 style={{ fontSize:20, fontWeight:600, marginBottom:4 }}>{admin ? 'All Buckets' : 'My Buckets'}</h1>
          <div style={{ fontSize:13, color:'var(--fg3)' }}>{buckets.length} bucket{buckets.length !== 1 ? 's' : ''} available</div>
        </div>
        <div style={{ display:'flex', gap:10, alignItems:'center' }}>
          {admin && (
            <select value={permission} onChange={e => setPermission(e.target.value)}
              style={{ ...inputStyle, width:'auto', padding:'7px 12px', cursor:'pointer' }}>
              <option value="read">Read-only</option>
              <option value="readwrite">Read / Write</option>
            </select>
          )}
          <button onClick={load} style={btnSecondary}><Icon name="refresh" size={14} /> Refresh</button>
        </div>
      </div>

      {buckets.length === 0 ? (
        <div style={{ padding:'60px 24px', textAlign:'center', color:'var(--fg3)' }}>
          <div style={{ marginBottom:12, opacity:.3 }}><Icon name="bucket" size={36} /></div>
          <div style={{ fontSize:15, fontWeight:500, marginBottom:6 }}>No buckets available</div>
          {!admin && <div style={{ fontSize:13 }}>Contact an admin to get access.</div>}
        </div>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap:16 }}>
          {buckets.map(b => (
            <div key={b.id} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:24, display:'flex', flexDirection:'column', gap:14, transition:'border-color .15s' }}
                 onMouseEnter={e => e.currentTarget.style.borderColor='var(--border2)'}
                 onMouseLeave={e => e.currentTarget.style.borderColor='var(--border)'}>
              <div>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                  <div style={{ color:'var(--accent)' }}><Icon name="bucket" size={16} /></div>
                  <span style={{ fontFamily:'var(--mono)', fontSize:14, fontWeight:600 }}>{b.name}</span>
                </div>
                {b.description
                  ? <div style={{ fontSize:13, color:'var(--fg2)', lineHeight:1.5 }}>{b.description}</div>
                  : <div style={{ fontSize:13, color:'var(--fg3)', fontStyle:'italic' }}>No description</div>}
              </div>
              <button onClick={() => handleGenerate(b)} disabled={!!generating}
                style={{ ...btnPrimary, justifyContent:'center', opacity: generating === b.id ? .7 : 1 }}>
                {generating === b.id
                  ? <><Spinner size={14} color="#0d1117" /> Generating…</>
                  : <><Icon name="key" size={14} /> Generate Keys</>}
              </button>
            </div>
          ))}
        </div>
      )}

      {modal && <CredModal creds={modal} onClose={() => setModal(null)} />}
    </div>
  );
}

/* ── KeysPage ── */
function KeysPage({ token, admin }) {
  const [keys, setKeys]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [deleting, setDeleting] = useState(null);

  const load = useCallback(async () => {
    const res = await fetch('/api/keys', { headers: { Authorization: `Bearer ${token}` } });
    if (res.ok) setKeys(await res.json());
  }, [token]);

  useEffect(() => { load().finally(() => setLoading(false)); }, [load]);

  const handleDelete = async (keyId, pgUsername) => {
    const msg = pgUsername
      ? `Revoke key ${keyId} and delete PostgreSQL user ${pgUsername}?`
      : `Revoke key ${keyId}?\n\nNote: the PostgreSQL user is unknown and won't be deleted automatically.`;
    if (!window.confirm(msg)) return;
    setDeleting(keyId);
    try {
      const url = pgUsername ? `/api/keys/${keyId}?pgUsername=${encodeURIComponent(pgUsername)}` : `/api/keys/${keyId}`;
      const res = await fetch(url, { method:'DELETE', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok && res.status !== 204) throw new Error(`HTTP ${res.status}`);
      setKeys(prev => prev.filter(k => k.keyId !== keyId));
    } catch (e) { alert('Error: ' + e.message); }
    finally { setDeleting(null); }
  };

  const formatDate = iso => iso ? new Date(iso).toLocaleDateString('sv-SE', { year:'numeric', month:'short', day:'numeric' }) : '';

  if (loading) return <div style={{ display:'flex', justifyContent:'center', padding:60 }}><Spinner size={24} /></div>;

  const cols = admin ? '2fr 1.5fr 1fr 1.5fr 1fr 60px' : '2fr 1.5fr 1fr 1.5fr 60px';
  const headers = ['Key ID', 'Bucket', 'Permission', ...(admin ? ['Created By'] : []), 'Created', ''];

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:28 }}>
        <div>
          <h1 style={{ fontSize:20, fontWeight:600, marginBottom:4 }}>{admin ? 'All Keys' : 'My Keys'}</h1>
          <div style={{ fontSize:13, color:'var(--fg3)' }}>{keys.length} active key{keys.length !== 1 ? 's' : ''}</div>
        </div>
        <button onClick={load} style={btnSecondary}><Icon name="refresh" size={14} /> Refresh</button>
      </div>

      <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, overflow:'hidden' }}>
        <div style={{ display:'grid', gridTemplateColumns:cols, padding:'11px 20px', borderBottom:'1px solid var(--border)', background:'rgba(255,255,255,.02)', gap:12 }}>
          {headers.map((h, i) => <span key={i} style={{ fontSize:11, fontWeight:600, color:'var(--fg3)', letterSpacing:'.08em', textTransform:'uppercase' }}>{h}</span>)}
        </div>

        {keys.length === 0 ? (
          <div style={{ padding:'48px 24px', textAlign:'center', color:'var(--fg3)', fontSize:13 }}>
            <div style={{ marginBottom:8, opacity:.3 }}><Icon name="key" size={28} /></div>
            No active keys. Go to Buckets to generate one.
          </div>
        ) : keys.map((k, idx) => (
          <div key={k.keyId} style={{ display:'grid', gridTemplateColumns:cols, padding:'13px 20px', borderBottom: idx<keys.length-1 ? '1px solid var(--border)' : 'none', gap:12, alignItems:'center', opacity: deleting === k.keyId ? 0 : 1, transition:'opacity .3s', background: idx%2===0 ? 'transparent' : 'rgba(255,255,255,.012)' }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:0 }}>
              <span style={{ fontFamily:'var(--mono)', fontSize:12, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1 }}>{k.keyId}</span>
              <CopyBtn text={k.keyId} small />
            </div>
            <span style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--fg2)' }}>{k.keyName || k.bucketName || '—'}</span>
            <span style={{ display:'inline-flex', alignItems:'center', padding:'2px 8px', borderRadius:20, fontSize:11, fontWeight:600, background: k.permission === 'readwrite' ? 'var(--accent-dim)' : 'rgba(139,148,158,.1)', color: k.permission === 'readwrite' ? 'var(--accent)' : 'var(--fg2)', border:`1px solid ${k.permission === 'readwrite' ? 'var(--accent-glow)' : 'var(--border)'}`, whiteSpace:'nowrap' }}>
              {k.permission === 'readwrite' ? 'Read/Write' : 'Read-only'}
            </span>
            {admin && <span style={{ fontSize:12, color:'var(--fg2)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{k.createdBy || '—'}</span>}
            <span style={{ fontSize:12, color:'var(--fg3)' }}>{formatDate(k.createdAt)}</span>
            <div style={{ display:'flex', justifyContent:'flex-end' }}>
              <button onClick={() => handleDelete(k.keyId, k.pgUsername)} disabled={!!deleting} title="Revoke key"
                style={{ background:'transparent', border:'1px solid transparent', borderRadius:6, color:'var(--fg3)', cursor:'pointer', width:30, height:30, display:'flex', alignItems:'center', justifyContent:'center' }}
                onMouseEnter={e => { e.currentTarget.style.background='var(--red-dim)'; e.currentTarget.style.borderColor='rgba(248,113,113,.25)'; e.currentTarget.style.color='var(--red)'; }}
                onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.borderColor='transparent'; e.currentTarget.style.color='var(--fg3)'; }}>
                {deleting === k.keyId ? <Spinner size={12} /> : <Icon name="trash" size={13} />}
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── AdminPage ── */
function AdminPage({ token }) {
  const [tab, setTab]           = useState('buckets');
  const [buckets, setBuckets]   = useState([]);
  const [grants, setGrants]     = useState([]);
  const [bLoading, setBLoading] = useState(true);
  const [gLoading, setGLoading] = useState(false);
  const [newName, setNewName]   = useState('');
  const [newDesc, setNewDesc]   = useState('');
  const [adding, setAdding]     = useState(false);
  const [gEmail, setGEmail]     = useState('');
  const [gBucketId, setGBucketId] = useState('');
  const [granting, setGranting] = useState(false);
  const [search, setSearch]     = useState('');

  const authFetch = useCallback((url, opts={}) =>
    fetch(url, { ...opts, headers: { ...opts.headers, Authorization: `Bearer ${token}` } }), [token]);

  const loadBuckets = useCallback(async () => {
    const res = await authFetch('/api/admin/buckets');
    if (res.ok) setBuckets(await res.json());
  }, [authFetch]);

  const loadGrants = useCallback(async (email='') => {
    setGLoading(true);
    const url = email ? `/api/admin/grants?email=${encodeURIComponent(email)}` : '/api/admin/grants';
    const res = await authFetch(url);
    if (res.ok) setGrants(await res.json());
    setGLoading(false);
  }, [authFetch]);

  useEffect(() => { loadBuckets().finally(() => setBLoading(false)); }, [loadBuckets]);
  useEffect(() => { if (tab === 'grants') loadGrants(); }, [tab, loadGrants]);

  const handleAddBucket = async () => {
    if (!newName.trim()) return;
    setAdding(true);
    try {
      const res = await authFetch('/api/admin/buckets', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name: newName.trim(), description: newDesc.trim() || null }) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `HTTP ${res.status}`); }
      setNewName(''); setNewDesc('');
      await loadBuckets();
    } catch (e) { alert('Error: ' + e.message); }
    finally { setAdding(false); }
  };

  const handleDeleteBucket = async (id) => {
    if (!window.confirm('Remove this bucket from the catalog?')) return;
    await authFetch(`/api/admin/buckets/${id}`, { method:'DELETE' });
    await loadBuckets();
  };

  const handleGrant = async () => {
    if (!gEmail.trim() || !gBucketId) return;
    setGranting(true);
    try {
      await authFetch('/api/admin/grants', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ studentEmail: gEmail.trim(), bucketId: gBucketId }) });
      setGEmail(''); setGBucketId('');
      await loadGrants(search);
    } catch (e) { alert('Error: ' + e.message); }
    finally { setGranting(false); }
  };

  const handleRevoke = async (studentEmail, bucketId) => {
    if (!window.confirm(`Revoke access for ${studentEmail}?`)) return;
    await authFetch('/api/admin/grants', { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ studentEmail, bucketId }) });
    await loadGrants(search);
  };

  const grouped = grants.reduce((acc, g) => { if (!acc[g.studentEmail]) acc[g.studentEmail] = []; acc[g.studentEmail].push(g); return acc; }, {});
  const tabStyle = active => ({ padding:'7px 16px', borderRadius:6, fontSize:13, fontWeight: active ? 500 : 400, color: active ? 'var(--fg)' : 'var(--fg2)', background: active ? 'var(--surface2)' : 'transparent', border:'none', cursor:'pointer', fontFamily:'var(--sans)', display:'flex', alignItems:'center', gap:6 });

  return (
    <div>
      <h1 style={{ fontSize:20, fontWeight:600, marginBottom:24 }}>Admin</h1>

      <div style={{ display:'flex', gap:4, marginBottom:28, background:'var(--surface)', borderRadius:8, padding:4, width:'fit-content', border:'1px solid var(--border)' }}>
        <button style={tabStyle(tab==='buckets')} onClick={() => setTab('buckets')}><Icon name="bucket" size={14} /> Buckets</button>
        <button style={tabStyle(tab==='grants')}  onClick={() => setTab('grants')}><Icon name="users" size={14} /> Grants</button>
      </div>

      {tab === 'buckets' && (
        <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
          <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, padding:24 }}>
            <div style={{ fontSize:13, fontWeight:600, marginBottom:16 }}>Add Bucket to Catalog</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr auto', gap:12, alignItems:'flex-end' }}>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:'var(--fg2)', marginBottom:6 }}>Bucket Name</label>
                <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="ducklake-ml" style={{ ...inputStyle, fontFamily:'var(--mono)' }} onFocus={focusAccent} onBlur={blurBorder} onKeyDown={e => e.key==='Enter' && handleAddBucket()} />
              </div>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:'var(--fg2)', marginBottom:6 }}>Description</label>
                <input value={newDesc} onChange={e => setNewDesc(e.target.value)} placeholder="ML datasets for course X" style={inputStyle} onFocus={focusAccent} onBlur={blurBorder} onKeyDown={e => e.key==='Enter' && handleAddBucket()} />
              </div>
              <button onClick={handleAddBucket} disabled={adding || !newName.trim()} style={{ ...btnPrimary, opacity: adding || !newName.trim() ? .6 : 1 }}>
                {adding ? <Spinner size={14} color="#0d1117" /> : <Icon name="plus" size={14} />} Add
              </button>
            </div>
          </div>

          <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, overflow:'hidden' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1.5fr 3fr 60px', padding:'11px 20px', borderBottom:'1px solid var(--border)', background:'rgba(255,255,255,.02)', gap:12 }}>
              {['Name','Description',''].map((h,i) => <span key={i} style={{ fontSize:11, fontWeight:600, color:'var(--fg3)', letterSpacing:'.08em', textTransform:'uppercase' }}>{h}</span>)}
            </div>
            {bLoading ? <div style={{ padding:32, display:'flex', justifyContent:'center' }}><Spinner /></div>
              : buckets.length === 0 ? <div style={{ padding:'40px 24px', textAlign:'center', color:'var(--fg3)', fontSize:13 }}>No buckets yet.</div>
              : buckets.map((b, idx) => (
                <div key={b.id} style={{ display:'grid', gridTemplateColumns:'1.5fr 3fr 60px', padding:'13px 20px', borderBottom: idx<buckets.length-1 ? '1px solid var(--border)' : 'none', gap:12, alignItems:'center', background: idx%2===0 ? 'transparent' : 'rgba(255,255,255,.012)' }}>
                  <span style={{ fontFamily:'var(--mono)', fontSize:13, fontWeight:500 }}>{b.name}</span>
                  <span style={{ fontSize:13, color:'var(--fg2)' }}>{b.description || <span style={{ color:'var(--fg3)', fontStyle:'italic' }}>—</span>}</span>
                  <div style={{ display:'flex', justifyContent:'flex-end' }}>
                    <button onClick={() => handleDeleteBucket(b.id)} title="Remove"
                      style={{ background:'transparent', border:'1px solid transparent', borderRadius:6, color:'var(--fg3)', cursor:'pointer', width:30, height:30, display:'flex', alignItems:'center', justifyContent:'center' }}
                      onMouseEnter={e => { e.currentTarget.style.background='var(--red-dim)'; e.currentTarget.style.borderColor='rgba(248,113,113,.25)'; e.currentTarget.style.color='var(--red)'; }}
                      onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.borderColor='transparent'; e.currentTarget.style.color='var(--fg3)'; }}>
                      <Icon name="trash" size={13} />
                    </button>
                  </div>
                </div>
              ))}
          </div>
        </div>
      )}

      {tab === 'grants' && (
        <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
          <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, padding:24 }}>
            <div style={{ fontSize:13, fontWeight:600, marginBottom:16 }}>Grant Bucket Access</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr auto', gap:12, alignItems:'flex-end' }}>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:'var(--fg2)', marginBottom:6 }}>Student Email</label>
                <input value={gEmail} onChange={e => setGEmail(e.target.value)} placeholder="student1@kth.se" style={inputStyle} onFocus={focusAccent} onBlur={blurBorder} />
              </div>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:'var(--fg2)', marginBottom:6 }}>Bucket</label>
                <select value={gBucketId} onChange={e => setGBucketId(e.target.value)} style={{ ...inputStyle, cursor:'pointer' }}>
                  <option value="">Select bucket…</option>
                  {buckets.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
              </div>
              <button onClick={handleGrant} disabled={granting || !gEmail.trim() || !gBucketId} style={{ ...btnPrimary, opacity: granting || !gEmail.trim() || !gBucketId ? .6 : 1 }}>
                {granting ? <Spinner size={14} color="#0d1117" /> : <Icon name="plus" size={14} />} Grant
              </button>
            </div>
          </div>

          <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, padding:24 }}>
            <div style={{ display:'flex', gap:12, marginBottom:20 }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Filter by email…" style={{ ...inputStyle, flex:1 }} onFocus={focusAccent} onBlur={blurBorder} onKeyDown={e => e.key==='Enter' && loadGrants(search)} />
              <button onClick={() => loadGrants(search)} style={btnSecondary}><Icon name="refresh" size={14} /> Search</button>
            </div>
            {gLoading ? <div style={{ display:'flex', justifyContent:'center', padding:32 }}><Spinner /></div>
              : Object.keys(grouped).length === 0 ? <div style={{ textAlign:'center', color:'var(--fg3)', fontSize:13, padding:'24px 0' }}>No grants found.</div>
              : Object.entries(grouped).map(([email, gs]) => (
                <div key={email} style={{ marginBottom:16 }}>
                  <div style={{ fontSize:12, fontWeight:600, color:'var(--fg2)', marginBottom:8, fontFamily:'var(--mono)' }}>{email}</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                    {gs.map(g => (
                      <div key={g.bucketId} style={{ display:'flex', alignItems:'center', gap:8, background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px' }}>
                        <Icon name="bucket" size={13} />
                        <span style={{ fontFamily:'var(--mono)', fontSize:12 }}>{g.bucketName}</span>
                        <button onClick={() => handleRevoke(email, g.bucketId)} title="Revoke"
                          style={{ background:'transparent', border:'none', color:'var(--fg3)', cursor:'pointer', display:'flex', padding:0 }}
                          onMouseEnter={e => e.currentTarget.style.color='var(--red)'}
                          onMouseLeave={e => e.currentTarget.style.color='var(--fg3)'}>
                          <Icon name="close" size={12} />
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── LoginScreen ── */
function LoginScreen() {
  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:32, padding:24 }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ color:'var(--accent)', marginBottom:16, display:'flex', justifyContent:'center' }}><Icon name="duck" size={48} /></div>
        <div style={{ fontWeight:700, fontSize:24, marginBottom:6 }}>DuckLake Access Manager</div>
        <div style={{ color:'var(--fg2)', fontSize:14 }}>Sign in to manage your access keys</div>
      </div>
      <button onClick={login} style={{ ...btnPrimary, padding:'12px 28px', fontSize:15 }}>Sign in with KTH</button>
    </div>
  );
}

/* ── App ── */
function App() {
  const [token, setToken]           = useState(null);
  const [idToken, setIdToken]       = useState(null);
  const [claims, setClaims]         = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [route, setRoute]           = useState(window.location.hash || '#/');

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      window.history.replaceState({}, '', '/');
      exchangeCode(code).then(data => {
        sessionStorage.setItem('access_token', data.access_token);
        if (data.id_token) sessionStorage.setItem('id_token', data.id_token);
        setToken(data.access_token);
        setIdToken(data.id_token || null);
        setClaims(parseJwt(data.access_token));
      }).catch(() => {}).finally(() => setAuthLoading(false));
    } else {
      const stored = sessionStorage.getItem('access_token');
      if (stored) {
        const c = parseJwt(stored);
        if (c && c.exp * 1000 > Date.now()) { setToken(stored); setIdToken(sessionStorage.getItem('id_token')); setClaims(c); }
        else { sessionStorage.removeItem('access_token'); sessionStorage.removeItem('id_token'); }
      }
      setAuthLoading(false);
    }
  }, []);

  useEffect(() => {
    const h = () => setRoute(window.location.hash || '#/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);

  if (authLoading) return <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}><Spinner size={24} /></div>;
  if (!token) return <LoginScreen />;

  const admin = isAdmin(claims);
  const displayName = claims?.preferred_username || claims?.email || 'User';

  const navItems = [
    { hash:'#/',      label:'Buckets' },
    { hash:'#/keys',  label:'My Keys' },
    ...(admin ? [{ hash:'#/admin', label:'Admin' }] : []),
  ];

  const renderPage = () => {
    if (route === '#/keys')              return <KeysPage token={token} admin={admin} />;
    if (route === '#/admin' && admin)    return <AdminPage token={token} />;
    return <BucketsPage token={token} admin={admin} />;
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      <header className="app-header" style={{ padding:'0 40px', height:56, display:'flex', alignItems:'center', gap:12, borderBottom:'1px solid var(--border)', background:'rgba(13,17,23,.95)', backdropFilter:'blur(8px)', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ width:28, height:28, color:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="duck" size={22} /></div>
        <span style={{ fontWeight:600, fontSize:15, letterSpacing:'-.01em' }}>DuckLake</span>
        <span style={{ width:1, height:16, background:'var(--border2)', margin:'0 2px' }}></span>
        <span style={{ color:'var(--fg2)', fontSize:14, fontWeight:400 }}>Access Manager</span>

        <nav style={{ display:'flex', gap:4, marginLeft:16 }}>
          {navItems.map(({ hash, label }) => {
            const active = hash === '#/' ? (route === '#/' || route === '#' || route === '') : route === hash;
            return (
              <a key={hash} href={hash} onClick={e => { e.preventDefault(); window.location.hash = hash; }}
                style={{ padding:'4px 12px', borderRadius:6, fontSize:13, fontWeight: active ? 500 : 400, color: active ? 'var(--fg)' : 'var(--fg2)', background: active ? 'var(--surface2)' : 'transparent', textDecoration:'none', transition:'all .15s' }}>
                {label}
              </a>
            );
          })}
        </nav>

        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:12 }}>
          {admin && <span style={{ padding:'3px 10px', background:'var(--accent-dim)', border:'1px solid var(--accent-glow)', borderRadius:20, fontSize:11, color:'var(--accent)', fontWeight:600, letterSpacing:'.04em' }}>ADMIN</span>}
          <span style={{ fontSize:13, color:'var(--fg2)' }}>{displayName}</span>
          <button onClick={() => logout(idToken)}
            style={{ display:'flex', alignItems:'center', gap:6, background:'transparent', border:'1px solid var(--border)', borderRadius:6, color:'var(--fg3)', padding:'5px 10px', cursor:'pointer', fontFamily:'var(--sans)', fontSize:12, fontWeight:500 }}
            onMouseEnter={e => { e.currentTarget.style.borderColor='var(--border2)'; e.currentTarget.style.color='var(--fg)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--fg3)'; }}>
            <Icon name="logout" size={13} /> Sign out
          </button>
        </div>
      </header>

      <main className="app-main" style={{ flex:1, padding:'40px', maxWidth:1100, width:'100%', margin:'0 auto' }}>
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
