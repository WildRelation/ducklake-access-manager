  @keyframes spin { to { transform: rotate(360deg); } }

<body>

<script type="text/babel">

const { useState, useEffect, useCallback } = React;

/* ── OAuth2 / Keycloak ── */
const KEYCLOAK_BASE = 'https://iam.cloud.cbh.kth.se/realms/cloud/protocol/openid-connect';
const CLIENT_ID = 'ducklake';
const REDIRECT_URI = window.location.origin + '/';

function generateCodeVerifier() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function parseJwt(token) {
  try { return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); }
  catch { return null; }
}

async function login() {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'code',
    scope: 'openid profile email',
    code_challenge: challenge,
    code_challenge_method: 'S256',
  });
  window.location.href = `${KEYCLOAK_BASE}/auth?${params}`;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  sessionStorage.removeItem('pkce_verifier');
  const res = await fetch(`${KEYCLOAK_BASE}/token`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      client_id: CLIENT_ID,
      redirect_uri: REDIRECT_URI,
      code,
      code_verifier: verifier,
    }),
  });
  if (!res.ok) throw new Error('Token exchange failed');
  return res.json();
}

function logout(token) {
  sessionStorage.removeItem('access_token');
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    post_logout_redirect_uri: REDIRECT_URI,
    id_token_hint: token,
  });
  window.location.href = `${KEYCLOAK_BASE}/logout?${params}`;
}

/* ── localStorage: keyId → { pg, perm } ── */
const STORAGE_KEY = 'ducklake_key_map';
function saveKeyMapping(keyId, pgUsername, permission) {
  try {
    const map = getKeyMap();
    map[keyId] = { pg: pgUsername, perm: permission };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(map));
  } catch {}
}
function getKeyMap() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function removeKeyMapping(keyId) {
  try {
    const map = getKeyMap();
    delete map[keyId];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(map));
  } catch {}
}

/* ── copy hook ── */
function useCopy() {
  const [copied, setCopied] = useState(null);
  const copy = useCallback((text, id) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(id);
      setTimeout(() => setCopied(null), 1800);
    });
  }, []);
  return [copied, copy];
}

/* ── icons ── */

    check:   <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    trash:   <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M2.5 4h11M5.5 4V2.5h5V4M6.5 7v5M9.5 7v5M3.5 4l.8 9.5h7.4l.8-9.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    refresh: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.86 4.4 2.2L14 3v4h-4l1.7-1.7" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    close:   <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    key:     <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="5.5" cy="8" r="3" stroke="currentColor" strokeWidth="1.4"/><path d="M8 8h6M12 8v2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>,
    warn:    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 1.5L14.5 13.5H1.5L8 1.5Z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/><path d="M8 6v3.5M8 11.5v.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    duck:    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><ellipse cx="8" cy="9" rx="5" ry="4" fill="currentColor" opacity=".9"/><circle cx="8" cy="5" r="2.5" fill="currentColor"/><path d="M10 5.5l2 .5-.5 1.5" stroke="var(--bg)" strokeWidth="1" strokeLinecap="round"/><circle cx="9" cy="4.8" r=".6" fill="var(--bg)"/></svg>,
    alert:   <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" strokeWidth="1.4"/><path d="M8 5v3.5M8 10.5v.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    logout:  <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };
  return icons[name] || null;
};

/* ── CopyBtn ── */
function CopyBtn({ text, id, copied, onCopy, small }) {
  const isCopied = copied === id;
  return (
    <button
      onClick={() => onCopy(text, id)}
      title="Copy"
      style={{
        display: 'flex', alignItems: 'center', gap: 4,
        background: isCopied ? 'var(--accent-dim)' : 'transparent',
        border: `1px solid ${isCopied ? 'var(--accent)' : 'var(--border)'}`,
        borderRadius: 6,
        color: isCopied ? 'var(--accent)' : 'var(--fg2)',
        padding: small ? '3px 7px' : '5px 9px',
        cursor: 'pointer',
        fontFamily: 'var(--sans)',
        fontSize: 12, fontWeight: 500,
        transition: 'all .15s',
        whiteSpace: 'nowrap', flexShrink: 0,
      }}
    >
      <Icon name={isCopied ? 'check' : 'copy'} size={13} />
      {!small && (isCopied ? 'Copied' : 'Copy')}
    </button>
  );
}

/* ── CredRow ── */
function CredRow({ label, value, id, copied, onCopy, secret }) {
  const [show, setShow] = useState(false);
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: '140px 1fr auto',
      alignItems: 'center', gap: 12,
      padding: '10px 0',

      <span
        style={{
          fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--fg)',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          cursor: secret ? 'pointer' : 'default',
          filter: secret && !show ? 'blur(4px)' : 'none',
          transition: 'filter .2s', userSelect: secret && !show ? 'none' : 'text',
        }}
        onClick={() => secret && setShow(s => !s)}
        title={secret ? (show ? 'Click to hide' : 'Click to reveal') : undefined}
      >
        {value}
      </span>
      <CopyBtn text={value} id={id} copied={copied} onCopy={onCopy} small />
    </div>
  );
}

                DuckDB Connection Script
              </div>
              <CopyBtn text={creds.duckdbScript} id="script" copied={copied} onCopy={onCopy} label="Copy full script" />

              <div style={{

                padding: '8px 14px', borderBottom: '1px solid var(--border)',

              }}>
                <div style={{ display: 'flex', gap: 6 }}>
                  {['#f87171','#fbbf24','#4ade80'].map(c => (

                <span style={{ fontSize: 11, color: 'var(--fg3)', fontFamily: 'var(--mono)' }}>connection.sql</span>

/* ── LoginScreen ── */

      <div style={{ textAlign: 'center' }}>

/* ── App ── */
function App() {
  const [token, setToken] = useState(null);
  const [idToken, setIdToken] = useState(null);
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  const [bucket, setBucket] = useState('ducklake');
  const [permission, setPermission] = useState('ro');
  const [generating, setGenerating] = useState(false);
  const [genError, setGenError] = useState(null);
  const [modal, setModal] = useState(null);
  const [keys, setKeys] = useState([]);
  const [keysLoading, setKeysLoading] = useState(true);
  const [keysError, setKeysError] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [deletingId, setDeletingId] = useState(null);
  const [copied, onCopy] = useCopy();

  /* handle OAuth2 callback or restore session */
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      window.history.replaceState({}, '', '/');
      exchangeCode(code)
        .then(data => {
          sessionStorage.setItem('access_token', data.access_token);
          if (data.id_token) sessionStorage.setItem('id_token', data.id_token);
          setToken(data.access_token);
          setIdToken(data.id_token || null);
          setUser(parseJwt(data.access_token));
        })
        .catch(() => {})
        .finally(() => setAuthLoading(false));
    } else {
      const stored = sessionStorage.getItem('access_token');
      if (stored) {
        const claims = parseJwt(stored);
        if (claims && claims.exp * 1000 > Date.now()) {
          setToken(stored);
          setIdToken(sessionStorage.getItem('id_token'));
          setUser(claims);
        } else {
          sessionStorage.removeItem('access_token');
          sessionStorage.removeItem('id_token');
        }
      }
      setAuthLoading(false);
    }
  }, []);

  /* authenticated fetch — redirects to login on 401 */
  const authFetch = useCallback(async (url, options = {}) => {
    const res = await fetch(url, {
      ...options,
      headers: {
        ...options.headers,
        'Authorization': `Bearer ${token}`,
      },
    });
    if (res.status === 401) {
      sessionStorage.removeItem('access_token');
      sessionStorage.removeItem('id_token');
      setToken(null);
      setUser(null);
    }
    return res;
  }, [token]);

  /* load keys */
  const loadKeys = useCallback(async () => {
    setKeysError(null);
    try {
      const res = await authFetch('/api/keys');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const map = getKeyMap();
      setKeys(data.map(k => {
        const entry = map[k.keyId];
        const localPg   = entry && typeof entry === 'object' ? entry.pg   : (entry || null);
        const localPerm = entry && typeof entry === 'object' ? entry.perm : null;
        return {
          keyId:      k.keyId,
          keyName:    k.bucketName || '—',
          pgUser:     k.pgUsername || localPg,
          permission: k.permission || localPerm || 'read',
        };
      }));
    } catch (e) {
      setKeysError(e.message);
    }
  }, [authFetch]);

  useEffect(() => {
    if (token) loadKeys().finally(() => setKeysLoading(false));
  }, [token, loadKeys]);

  const handleRefresh = async () => {
    setRefreshing(true);
    await loadKeys();
    setRefreshing(false);
  };

  /* generate key */
  const handleGenerate = async () => {
    if (!bucket.trim()) return;
    setGenerating(true);
    setGenError(null);
    try {
      const apiPermission = permission === 'ro' ? 'read' : 'readwrite';
      const res = await authFetch('/api/keys/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bucketName: bucket.trim(), permission: apiPermission }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || err.error || `HTTP ${res.status}`);
      }
      const data = await res.json();

      saveKeyMapping(data.s3Key.keyId, data.dbCredentials.username, data.s3Key.permission);

      const envBlock = [
        `AWS_ACCESS_KEY_ID=${data.s3Key.keyId}`,
        `AWS_SECRET_ACCESS_KEY=${data.s3Key.secretKey}`,
        `AWS_ENDPOINT_URL=${data.s3Key.endpoint}`,
        `AWS_DEFAULT_REGION=${data.s3Key.region}`,
        `S3_BUCKET=${data.s3Key.bucketName}`,
        ``,
        `PGHOST=${data.dbCredentials.host}`,
        `PGPORT=${data.dbCredentials.port}`,
        `PGDATABASE=${data.dbCredentials.database}`,
        `PGUSER=${data.dbCredentials.username}`,
        `PGPASSWORD=${data.dbCredentials.password}`,
      ].join('\n');

      const creds = {
        keyId:       data.s3Key.keyId,
        secretKey:   data.s3Key.secretKey,
        keyName:     `key-${data.s3Key.bucketName}`,
        s3Endpoint:  data.s3Key.endpoint,
        bucket:      data.s3Key.bucketName,
        pgHost:      `${data.dbCredentials.host}:${data.dbCredentials.port}`,
        pgDatabase:  data.dbCredentials.database,
        pgUser:      data.dbCredentials.username,
        pgPass:      data.dbCredentials.password,
        permission,
        duckdbScript: data.duckdbScript,
        envBlock,
      };

      setModal(creds);
      await loadKeys();
    } catch (e) {
      setGenError(e.message);
    } finally {
      setGenerating(false);
    }
  };

  /* delete key */
  const handleDelete = async (keyId, pgUser) => {
    const msg = pgUser
      ? `Revoke key ${keyId} and delete PostgreSQL user ${pgUser}?`
      : `Revoke key ${keyId}?\n\nNote: the PostgreSQL user is unknown and won't be deleted automatically.`;
    if (!window.confirm(msg)) return;

    setDeletingId(keyId);
    try {
      const url = pgUser
        ? `/api/keys/${keyId}?pgUsername=${encodeURIComponent(pgUser)}`
        : `/api/keys/${keyId}`;
      const res = await authFetch(url, { method: 'DELETE' });
      if (!res.ok && res.status !== 204) throw new Error(`HTTP ${res.status}`);
      removeKeyMapping(keyId);
      await loadKeys();
    } catch (e) {
      alert('Error deleting key: ' + e.message);
    } finally {
      setDeletingId(null);
    }
  };

  if (authLoading) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ animation: 'spin .7s linear infinite', color: 'var(--accent)' }}>
          <circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2.5" strokeDasharray="20 40" strokeLinecap="round"/>
        </svg>
      </div>
    );
  }

  if (!token) return <LoginScreen onLogin={login} />;

  const displayName = user?.preferred_username || user?.email || 'User';

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      {/* header */}
      <header style={{
        padding: '0 40px', height: 56,
        display: 'flex', alignItems: 'center', gap: 12,
        borderBottom: '1px solid var(--border)',
        background: 'rgba(13,17,23,.95)',
        backdropFilter: 'blur(8px)',
        position: 'sticky', top: 0, zIndex: 10,
      }}>
        <div style={{ width: 28, height: 28, color: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="duck" size={22} />
        </div>
        <span style={{ fontWeight: 600, fontSize: 15, letterSpacing: '-.01em' }}>DuckLake</span>
        <span style={{ width: 1, height: 16, background: 'var(--border2)', margin: '0 2px' }}></span>
        <span style={{ color: 'var(--fg2)', fontSize: 14, fontWeight: 400 }}>Access Manager</span>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{
            padding: '3px 10px',
            background: 'var(--accent-dim)', border: '1px solid var(--accent-glow)',
            borderRadius: 20, fontSize: 11, color: 'var(--accent)', fontWeight: 600, letterSpacing: '.04em',
          }}>
            {keys.length} {keys.length === 1 ? 'KEY' : 'KEYS'}
          </div>
          <span style={{ fontSize: 13, color: 'var(--fg2)' }}>{displayName}</span>
          <button
            onClick={() => logout(idToken)}
            title="Sign out"
            style={{
              display: 'flex', alignItems: 'center', gap: 6,
              background: 'transparent', border: '1px solid var(--border)',
              borderRadius: 6, color: 'var(--fg3)',
              padding: '5px 10px', cursor: 'pointer',
              fontFamily: 'var(--sans)', fontSize: 12, fontWeight: 500,
              transition: 'all .15s',
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor='var(--border2)'; e.currentTarget.style.color='var(--fg)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--fg3)'; }}
          >
            <Icon name="logout" size={13} />
            Sign out
          </button>
        </div>
      </header>

      <main style={{ flex: 1, padding: '40px', maxWidth: 900, width: '100%', margin: '0 auto' }}>

        {/* Generate Key */}
        <section style={{ marginBottom: 40 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
            <div style={{
              width: 28, height: 28, background: 'var(--accent-dim)',
              border: '1px solid var(--accent-glow)', borderRadius: 7,
              display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--accent)',
            }}>
              <Icon name="key" size={13} />
            </div>
            <h2 style={{ fontSize: 15, fontWeight: 600 }}>Generate Key</h2>
          </div>

          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 14, padding: '28px' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 200px auto', gap: 12, alignItems: 'flex-end' }}>
              {/* bucket */}
              <div>
                <label style={{ display: 'block', fontSize: 12, fontWeight: 500, color: 'var(--fg2)', marginBottom: 8 }}>Bucket Name</label>
                <input
                  type="text" value={bucket}
                  onChange={e => setBucket(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleGenerate()}
                  placeholder="ducklake"
                  style={{
                    width: '100%', background: 'var(--bg)',
                    border: '1px solid var(--border)', borderRadius: 7,
                    padding: '9px 13px', color: 'var(--fg)',
                    fontFamily: 'var(--mono)', fontSize: 13, outline: 'none',
                  }}
                  onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                  onBlur={e => e.target.style.borderColor = 'var(--border)'}
                />
              </div>

              {/* permission */}
              <div>
                <label style={{ display: 'block', fontSize: 12, fontWeight: 500, color: 'var(--fg2)', marginBottom: 8 }}>Permission</label>
                <div style={{ position: 'relative' }}>
                  <select
                    value={permission} onChange={e => setPermission(e.target.value)}
                    style={{
                      width: '100%', background: 'var(--bg)',
                      border: '1px solid var(--border)', borderRadius: 7,
                      padding: '9px 36px 9px 13px', color: 'var(--fg)',
                      fontFamily: 'var(--sans)', fontSize: 13,
                      outline: 'none', appearance: 'none', cursor: 'pointer',
                    }}
                    onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                    onBlur={e => e.target.style.borderColor = 'var(--border)'}
                  >
                    <option value="ro">Read-only</option>
                    <option value="rw">Read / Write</option>
                  </select>
                  <div style={{ position: 'absolute', right: 11, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none', color: 'var(--fg3)' }}>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                </div>
              </div>

              {/* button */}
              <button
                onClick={handleGenerate}
                disabled={generating || !bucket.trim()}
                style={{ ...btnPrimary, opacity: generating || !bucket.trim() ? .6 : 1, minWidth: 140, justifyContent: 'center', paddingTop: 9, paddingBottom: 9 }}
              >
                {generating ? (
                  <>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ animation: 'spin .7s linear infinite' }}>
                      <circle cx="7" cy="7" r="5.5" stroke="currentColor" strokeWidth="1.8" strokeDasharray="12 22" strokeLinecap="round"/>
                    </svg>
                    Generating…
                  </>
                ) : (
                  <><Icon name="key" size={14} /> Generate Key</>
                )}
              </button>
            </div>

            {genError && (
              <div style={{
                marginTop: 16, padding: '10px 14px',
                background: 'var(--red-dim)', border: '1px solid rgba(248,113,113,.25)',
                borderRadius: 8, display: 'flex', alignItems: 'flex-start', gap: 10,
                color: 'var(--red)', fontSize: 13,
              }}>
                <Icon name="alert" size={15} />
                <span>{genError}</span>
              </div>
            )}

            {!genError && (
              <div style={{
                marginTop: 16, padding: '10px 14px',
                background: 'var(--bg)', border: '1px solid var(--border)',
                borderRadius: 8, fontSize: 12, color: 'var(--fg3)',
                display: 'flex', alignItems: 'center', gap: 8,
              }}>
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" strokeWidth="1.3"/><path d="M6.5 5.5v4M6.5 4v.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
                A Garage S3 key and a dedicated PostgreSQL user will be provisioned with the selected permission level.
              </div>
            )}
          </div>
        </section>

        {/* Existing Keys */}
        <section>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{
                width: 28, height: 28, background: 'rgba(139,148,158,.1)',
                border: '1px solid var(--border)', borderRadius: 7,
                display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--fg2)',
              }}>
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="3" width="11" height="7" rx="1.5" stroke="currentColor" strokeWidth="1.3"/><path d="M4 6.5h5M4 8.5h3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>
              </div>
              <h2 style={{ fontSize: 15, fontWeight: 600 }}>Existing Keys</h2>
            </div>
            <button onClick={handleRefresh} style={{ ...btnSecondary, padding: '7px 14px' }}>
              <div style={{ animation: refreshing ? 'spin .7s linear infinite' : 'none' }}>
                <Icon name="refresh" size={14} />
              </div>
              Refresh
            </button>
          </div>

          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 14, overflow: 'hidden' }}>
            <div style={{
              display: 'grid', gridTemplateColumns: '2fr 2.5fr 1.5fr 100px 80px',
              padding: '11px 20px', borderBottom: '1px solid var(--border)',
              background: 'rgba(255,255,255,.02)', gap: 12,
            }}>
              {['Key ID', 'Key Name', 'PG Username', 'Permission', ''].map((h, i) => (
                <span key={i} style={{
                  fontSize: 11, fontWeight: 600, color: 'var(--fg3)',
                  letterSpacing: '.08em', textTransform: 'uppercase',
                  textAlign: i === 4 ? 'right' : 'left',
                }}>{h}</span>
              ))}
            </div>

            {keysLoading ? (
              <div style={{ padding: '32px 24px', textAlign: 'center' }}>
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ animation: 'spin .7s linear infinite', color: 'var(--accent)' }}>
                  <circle cx="9" cy="9" r="7" stroke="currentColor" strokeWidth="2" strokeDasharray="16 28" strokeLinecap="round"/>
                </svg>
              </div>
            ) : keysError ? (
              <div style={{ padding: '24px', display: 'flex', alignItems: 'center', gap: 10, color: 'var(--red)', fontSize: 13 }}>
                <Icon name="alert" size={15} />
                Could not load keys: {keysError}
              </div>
            ) : keys.length === 0 ? (
              <div style={{ padding: '48px 24px', textAlign: 'center', color: 'var(--fg3)', fontSize: 13 }}>
                <div style={{ marginBottom: 8, opacity: .4 }}><Icon name="key" size={28} /></div>
                No access keys found. Generate one above.
              </div>
            ) : keys.map((key, idx) => (
              <div key={key.keyId} style={{
                display: 'grid', gridTemplateColumns: '2fr 2.5fr 1.5fr 100px 80px',
                padding: '13px 20px',
                borderBottom: idx < keys.length - 1 ? '1px solid var(--border)' : 'none',
                gap: 12, alignItems: 'center',
                opacity: deletingId === key.keyId ? 0 : 1,
                transition: 'opacity .3s',
                background: idx % 2 === 0 ? 'transparent' : 'rgba(255,255,255,.012)',
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
                  <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--fg)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>{key.keyId}</span>
                  <CopyBtn text={key.keyId} id={`kid-${key.keyId}`} copied={copied} onCopy={onCopy} small />
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
                  <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--fg2)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>{key.keyName}</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
                  {key.pgUser ? (
                    <>
                      <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--fg2)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>{key.pgUser}</span>
                      <CopyBtn text={key.pgUser} id={`pg-${key.keyId}`} copied={copied} onCopy={onCopy} small />
                    </>
                  ) : (
                    <span style={{ fontSize: 12, color: 'var(--fg3)', fontStyle: 'italic' }}>unknown</span>
                  )}
                </div>
                <div>
                  <span style={{
                    display: 'inline-flex', alignItems: 'center',
                    padding: '3px 9px', borderRadius: 20,
                    fontSize: 11, fontWeight: 600,
                    background: key.permission === 'readwrite' ? 'var(--accent-dim)' : 'rgba(139,148,158,.1)',
                    color: key.permission === 'readwrite' ? 'var(--accent)' : 'var(--fg2)',
                    border: `1px solid ${key.permission === 'readwrite' ? 'var(--accent-glow)' : 'var(--border)'}`,
                  }}>
                    {key.permission === 'readwrite' ? 'Read/Write' : 'Read-only'}
                  </span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
                  <button
                    onClick={() => handleDelete(key.keyId, key.pgUser)}
                    disabled={!!deletingId}
                    title="Revoke key and delete PG user"
                    style={{
                      display: 'flex', alignItems: 'center', gap: 5,
                      background: 'transparent', border: '1px solid transparent',
                      borderRadius: 6, color: 'var(--fg3)',
                      padding: '5px 9px', cursor: 'pointer',
                      fontFamily: 'var(--sans)', fontSize: 12, fontWeight: 500,
                      transition: 'all .15s',
                    }}
                    onMouseEnter={e => {
                      e.currentTarget.style.background = 'var(--red-dim)';
                      e.currentTarget.style.borderColor = 'rgba(248,113,113,.25)';
                      e.currentTarget.style.color = 'var(--red)';
                    }}
                    onMouseLeave={e => {
                      e.currentTarget.style.background = 'transparent';
                      e.currentTarget.style.borderColor = 'transparent';
                      e.currentTarget.style.color = 'var(--fg3)';
                    }}
                  >
                    {deletingId === key.keyId ? (
                      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style={{ animation: 'spin .7s linear infinite' }}>
                        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" strokeWidth="1.6" strokeDasharray="10 18" strokeLinecap="round"/>
                      </svg>
                    ) : <Icon name="trash" size={13} />}
                    Delete
                  </button>
                </div>
              </div>
            ))}
          </div>

          {keys.length > 0 && (
            <div style={{ marginTop: 10, textAlign: 'right', fontSize: 12, color: 'var(--fg3)' }}>
              {keys.length} key{keys.length !== 1 ? 's' : ''} total
            </div>
          )}
        </section>
      </main>

      {modal && <CredModal creds={modal} onClose={() => setModal(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
