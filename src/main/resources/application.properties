server.port=${PORT:8080}

# PostgreSQL (admin connection for creating users)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${PG_PORT:5432}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_ADMIN_USER}
spring.datasource.password=${POSTGRES_ADMIN_PASSWORD}
# Låt inte misslyckad PostgreSQL-anslutning vid uppstart krascha tjänsten
spring.datasource.hikari.initialization-fail-timeout=-1

# DuckLake-specific Postgres config (used in generated credentials and SQL grants)
ducklake.postgres.host=${POSTGRES_HOST}
ducklake.postgres.port=${PG_PORT:5432}
ducklake.postgres.dbname=${POSTGRES_DB}
# Public hostname returned in the DuckDB script — defaults to POSTGRES_HOST (useful in local dev)
ducklake.postgres.public-host=${POSTGRES_PUBLIC_HOST:${POSTGRES_HOST}}

# Garage Admin API
garage.admin.url=${GARAGE_ADMIN_URL}
garage.admin.token=${GARAGE_ADMIN_TOKEN}
garage.s3.endpoint=${GARAGE_S3_ENDPOINT}
garage.s3.region=${GARAGE_S3_REGION:garage}
