server.port=${PORT:8080}

# PostgreSQL (admin connection for creating users)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_ADMIN_USER}
spring.datasource.password=${POSTGRES_ADMIN_PASSWORD}
spring.datasource.host=${POSTGRES_HOST}
spring.datasource.dbname=${POSTGRES_DB}
spring.datasource.port=${POSTGRES_PORT:5432}
# Låt inte misslyckad PostgreSQL-anslutning vid uppstart krascha tjänsten
spring.datasource.hikari.initialization-fail-timeout=-1

# Garage Admin API
garage.admin.url=${GARAGE_ADMIN_URL}
garage.admin.token=${GARAGE_ADMIN_TOKEN}
garage.s3.endpoint=${GARAGE_S3_ENDPOINT}
