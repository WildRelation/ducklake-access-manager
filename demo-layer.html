<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DuckLake — Demo Layer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1e2530;
    --border: #2a3140; --border2: #3a4455;
    --fg: #e6edf3; --fg2: #8b949e; --fg3: #4d5562;
    --accent: #2dd4bf; --accent-dim: rgba(45,212,191,.12); --accent-glow: rgba(45,212,191,.25);
    --yellow: #fbbf24; --yellow-dim: rgba(251,191,36,.10);
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  html, body { height: 100%; background: transparent; }
  body { font-family: var(--sans); color: var(--fg); font-size: 14px; line-height: 1.6; }

  /* transparent background so the card/modal can be extracted as a layer */
  #root { display: flex; align-items: flex-start; justify-content: center; padding: 40px; min-height: 100vh; }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn  { from { opacity:0; }                         to { opacity:1; } }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin    { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ── Fake credentials ── */
const FAKE_CREDS = {
  s3Key: {
    keyId:      'GK3a7f2b8c4d5e6f7a',
    secretKey:  'f4e9a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0',
    bucketName: 'titanic-2026',
    permission: 'read',
    endpoint:   'ducklake-garage:3900',
    region:     'garage',
  },
  dbCredentials: {
    host:     'ducklake-catalog',
    port:     5432,
    database: 'dl_titanic_2026',
    username: 'dl_ro_a7f3b2c1',
    password: '9e4f1a2b-3c4d-5e6f-7a8b-9c0d1e2f3a4b',
  },
  duckdbScript: `-- Run this from a deployment that can reach ducklake-catalog and ducklake-garage.

INSTALL ducklake; INSTALL postgres;
LOAD ducklake;    LOAD postgres;

CREATE OR REPLACE SECRET (
    TYPE postgres,
    HOST 'ducklake-catalog', PORT 5432,
    DATABASE dl_titanic_2026,
    USER 'dl_ro_a7f3b2c1',
    PASSWORD '9e4f1a2b-3c4d-5e6f-7a8b-9c0d1e2f3a4b'
);

CREATE OR REPLACE SECRET garage_secret (
    TYPE s3, PROVIDER config,
    KEY_ID 'GK3a7f2b8c4d5e6f7a',
    SECRET 'f4e9a1b2c3d4...e9f0',
    REGION 'garage',
    ENDPOINT 'ducklake-garage:3900',
    URL_STYLE 'path', USE_SSL false
);

ATTACH 'ducklake:postgres:dbname=dl_titanic_2026' AS my_ducklake (
    DATA_PATH 's3://titanic-2026/'
);
USE my_ducklake;`,
  envFile: `# PostgreSQL — compatible with psycopg2, SQLAlchemy, libpq
PGHOST=ducklake-catalog
PGPORT=5432
PGDATABASE=dl_titanic_2026
PGUSER=dl_ro_a7f3b2c1
PGPASSWORD=9e4f1a2b-3c4d-5e6f-7a8b-9c0d1e2f3a4b

# S3 — compatible with boto3, s3fs, DuckDB
AWS_ACCESS_KEY_ID=GK3a7f2b8c4d5e6f7a
AWS_SECRET_ACCESS_KEY=f4e9a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0
AWS_DEFAULT_REGION=garage
AWS_ENDPOINT_URL=http://ducklake-garage:3900
S3_BUCKET=titanic-2026`,
};

/* ── Icons ── */
const Icon = ({ name, size=16 }) => ({
  key:      <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="5.5" cy="8" r="3" stroke="currentColor" strokeWidth="1.4"/><path d="M8 8h6M12 8v2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>,
  close:    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  warn:     <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 1.5L14.5 13.5H1.5L8 1.5Z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/><path d="M8 6v3.5M8 11.5v.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  copy:     <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.4"/><path d="M3 11V3a1 1 0 0 1 1-1h8" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>,
  check:    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  download: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M2 12h12" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
}[name] || null);

function Spinner({ size=18, color='var(--accent)' }) {
  return <svg width={size} height={size} viewBox="0 0 18 18" fill="none" style={{ animation:'spin .7s linear infinite', color }}><circle cx="9" cy="9" r="7" stroke="currentColor" strokeWidth="2" strokeDasharray="16 28" strokeLinecap="round"/></svg>;
}

function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1800); });
  return (
    <button onClick={copy} style={{ display:'flex', alignItems:'center', gap:4, background: copied ? 'var(--accent-dim)' : 'transparent', border:`1px solid ${copied ? 'var(--accent)' : 'var(--border)'}`, borderRadius:6, color: copied ? 'var(--accent)' : 'var(--fg2)', padding:'5px 9px', cursor:'pointer', fontFamily:'var(--sans)', fontSize:12, fontWeight:500, whiteSpace:'nowrap' }}>
      <Icon name={copied ? 'check' : 'copy'} size={13} />
      {copied ? 'Copied' : 'Copy'}
    </button>
  );
}

function CredRow({ label, value, secret }) {
  const [show, setShow] = useState(false);
  const display = secret && !show ? '•'.repeat(Math.min(value.length, 24)) : value;
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid var(--border)', gap:12 }}>
      <span style={{ fontSize:12, color:'var(--fg3)', flexShrink:0, width:110 }}>{label}</span>
      <span style={{ fontFamily:'var(--mono)', fontSize:12, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--fg)' }}>{display}</span>
      <div style={{ display:'flex', gap:6, flexShrink:0 }}>
        {secret && <button onClick={() => setShow(s => !s)} style={{ background:'transparent', border:'1px solid var(--border)', borderRadius:5, color:'var(--fg3)', cursor:'pointer', fontSize:11, padding:'2px 7px', fontFamily:'var(--sans)' }}>{show ? 'Hide' : 'Show'}</button>}
        <CopyBtn text={value} />
      </div>
    </div>
  );
}

/* ── Credential modal ── */
function CredModal({ onClose }) {
  useEffect(() => { const h = e => { if (e.key === 'Escape') onClose(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [onClose]);
  const { s3Key, dbCredentials: db, duckdbScript, envFile } = FAKE_CREDS;

  function downloadEnv() {
    const blob = new Blob([envFile], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `.env.${s3Key.bucketName}`; a.click();
    URL.revokeObjectURL(url);
  }

  const btnSecondary = { display:'flex', alignItems:'center', gap:7, background:'transparent', color:'var(--fg2)', border:'1px solid var(--border)', borderRadius:7, padding:'9px 18px', fontFamily:'var(--sans)', fontSize:13, fontWeight:500, cursor:'pointer' };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, width:'100%', maxWidth:720, maxHeight:'92vh', overflow:'hidden', display:'flex', flexDirection:'column', animation:'slideUp .25s cubic-bezier(.16,1,.3,1)', boxShadow:'0 32px 64px rgba(0,0,0,.6)' }}>

        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:32, height:32, background:'var(--accent-dim)', border:'1px solid var(--accent-glow)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--accent)' }}><Icon name="key" size={15} /></div>
            <div>
              <div style={{ fontWeight:600, fontSize:15 }}>Access Key Generated</div>
              <div style={{ color:'var(--fg2)', fontSize:12 }}>{s3Key.bucketName}</div>
            </div>
          </div>
          <button onClick={onClose} style={{ background:'transparent', border:'1px solid var(--border)', borderRadius:6, color:'var(--fg2)', cursor:'pointer', width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="close" size={14} /></button>
        </div>

        {/* Body */}
        <div style={{ overflowY:'auto', flex:1 }}>
          <div style={{ margin:'16px 24px 0', padding:'10px 14px', background:'var(--yellow-dim)', border:'1px solid rgba(251,191,36,.25)', borderRadius:8, display:'flex', gap:10, color:'var(--yellow)', fontSize:13 }}>
            <Icon name="warn" size={15} /><span><strong>Save your Secret Key now.</strong> It will not be shown again after you close this dialog.</span>
          </div>

          <div style={{ padding:'20px 24px 0' }}>
            <div style={{ fontSize:11, fontWeight:600, color:'var(--fg3)', letterSpacing:'.08em', textTransform:'uppercase', marginBottom:4 }}>Raw Credentials</div>
            <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8, padding:'0 16px' }}>
              <CredRow label="S3 Key ID"     value={s3Key.keyId} />
              <CredRow label="S3 Secret Key" value={s3Key.secretKey} secret />
              <CredRow label="S3 Endpoint"   value={s3Key.endpoint} />
              <CredRow label="Bucket"        value={s3Key.bucketName} />
              <CredRow label="PG Host"       value={`${db.host}:${db.port}`} />
              <CredRow label="PG Database"   value={db.database} />
              <CredRow label="PG Username"   value={db.username} />
              <CredRow label="PG Password"   value={db.password} secret />
            </div>
          </div>

          <div style={{ padding:'20px 24px 24px' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
              <div style={{ fontSize:11, fontWeight:600, color:'var(--fg3)', letterSpacing:'.08em', textTransform:'uppercase' }}>DuckDB Connection Script</div>
              <CopyBtn text={duckdbScript} />
            </div>
            <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8, overflow:'hidden' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 14px', borderBottom:'1px solid var(--border)', background:'rgba(255,255,255,.02)' }}>
                <div style={{ display:'flex', gap:6 }}>{['#f87171','#fbbf24','#4ade80'].map(c => <div key={c} style={{ width:10, height:10, borderRadius:'50%', background:c, opacity:.6 }} />)}</div>
                <span style={{ fontSize:11, color:'var(--fg3)', fontFamily:'var(--mono)' }}>connection.sql</span>
                <div style={{ width:40 }} />
              </div>
              <pre style={{ fontFamily:'var(--mono)', fontSize:12, lineHeight:1.7, color:'var(--fg)', padding:'16px', overflow:'auto', margin:0, whiteSpace:'pre' }}>{duckdbScript}</pre>
            </div>
          </div>
        </div>

        {/* Footer */}
        <div style={{ padding:'16px 24px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0 }}>
          <button onClick={downloadEnv} style={{ ...btnSecondary, display:'flex', alignItems:'center', gap:6 }}><Icon name="download" size={14} /> Download .env</button>
          <button onClick={onClose} style={btnSecondary}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ── Dataset card ── */
function DatasetCard() {
  const [generating, setGenerating] = useState(false);
  const [modal, setModal]           = useState(false);

  const dataset = {
    title:       'Titanic 2026',
    bucketName:  'titanic-2026',
    description: 'Passenger survival data from the Titanic. Includes age, class, fare, cabin and survival outcome for 891 passengers.',
    ownerEmail:  'admin@kth.se',
    visibility:  'public',
  };

  const handleGenerate = () => {
    setGenerating(true);
    setTimeout(() => { setGenerating(false); setModal(true); }, 900);
  };

  const btnPrimary = { display:'flex', alignItems:'center', gap:7, background:'var(--accent)', color:'#0d1117', border:'none', borderRadius:7, padding:'9px 18px', fontFamily:'var(--sans)', fontSize:13, fontWeight:600, cursor:'pointer', justifyContent:'center' };

  return (
    <>
      <div style={{ width:340, background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:20, display:'flex', flexDirection:'column', gap:12, boxShadow:'0 8px 32px rgba(0,0,0,.4)' }}>
        {/* Title + badge */}
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8 }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:15, fontWeight:600, marginBottom:4 }}>{dataset.title}</div>
            <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--fg3)' }}>{dataset.bucketName}</div>
          </div>
          <span style={{ flexShrink:0, padding:'2px 8px', borderRadius:10, fontSize:10, fontWeight:600, letterSpacing:'.06em', textTransform:'uppercase', border:'1px solid var(--accent-glow)', background:'var(--accent-dim)', color:'var(--accent)' }}>
            {dataset.visibility}
          </span>
        </div>

        {/* Description */}
        <div style={{ flex:1, fontSize:12, color:'var(--fg2)', lineHeight:1.6 }}>
          {dataset.description}
        </div>

        {/* Owner */}
        <div style={{ fontSize:11, color:'var(--fg3)', borderTop:'1px solid var(--border)', paddingTop:10 }}>
          Owner: <span style={{ fontFamily:'var(--mono)' }}>{dataset.ownerEmail}</span>
        </div>

        {/* Button */}
        <button onClick={handleGenerate} disabled={generating} style={{ ...btnPrimary, opacity: generating ? .75 : 1 }}>
          {generating
            ? <><Spinner size={14} color="#0d1117" /> Generating…</>
            : <><Icon name="key" size={14} /> Generate Keys</>}
        </button>
      </div>

      {modal && <CredModal onClose={() => setModal(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DatasetCard />);
</script>
</body>
</html>
